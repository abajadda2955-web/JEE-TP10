<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Espace Sécurisé</title>
    <style>
        /* Petit style pour rendre la page plus agréable */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: white;
            padding: 35px;
            border-radius: 12px;
            width: 380px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #1e3c72;
            margin-bottom: 25px;
            font-size: 26px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #1e3c72;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .error-message {
            background-color: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            border-left: 4px solid #c62828;
        }

        .success-message {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            border-left: 4px solid #2e7d32;
        }

        .info-test {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #666;
            text-align: center;
        }

        .info-test p {
            margin: 5px 0;
        }

        .info-test strong {
            color: #1e3c72;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h2>🔐 Connexion</h2>

    <!-- Affichage du message d'erreur si les identifiants sont mauvais -->
    <div th:if="${param.error}" class="error-message">
        ❌ Identifiant ou mot de passe incorrect. Veuillez réessayer.
    </div>

    <!-- Affichage du message de confirmation après déconnexion -->
    <div th:if="${param.logout}" class="success-message">
        ✅ Vous avez été déconnecté avec succès. À bientôt !
    </div>

    <!-- Formulaire d'authentification -->
    <form th:action="@{/authenticate}" method="post">
        <div class="form-group">
            <label>👤 Nom d'utilisateur</label>
            <input type="text" name="username" placeholder="admin ou user" required>
        </div>

        <div class="form-group">
            <label>🔒 Mot de passe</label>
            <input type="password" name="password" placeholder="************" required>
        </div>

        <button type="submit">Se connecter</button>
    </form>

    <div class="info-test">
        <p>📝 <strong>Comptes de démonstration :</strong></p>
        <p>admin / 1234 (accès complet)</p>
        <p>user / 1111 (accès limité)</p>
    </div>
</div>
</body>
</html>
